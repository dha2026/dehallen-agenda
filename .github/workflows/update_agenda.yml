name: Update De Hallen Agenda

on:
  schedule:
    # Elke dag om 07:00 Amsterdam-tijd (= 05:00 UTC)
    - cron: "0 5 * * *"
  workflow_dispatch:
    # Handmatig uitvoeren via de GitHub-website

jobs:
  update-agenda:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Packages installeren
        run: pip install requests beautifulsoup4

      - name: Agenda scrapen en ICS genereren
        run: python scrape_agenda.py

      - name: ICS-bestand publiceren naar GitHub Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add agenda.ics
          git diff --staged --quiet || git commit -m "Agenda bijgewerkt: $(date +'%Y-%m-%d')"
          git push
